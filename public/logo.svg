<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- CARTINT logo: a shield with a car silhouette, emerald accent -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M16 2 L28 6 V16 C28 23 23 28 16 31 C9 28 4 23 4 16 V6 Z"
        fill="url(#shieldGrad)" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Car silhouette (simplified) -->
  <g fill="#10b981">
    <!-- Car body -->
    <path d="M8 19 L9.5 14.5 C9.8 13.6 10.6 13 11.5 13 H20.5 C21.4 13 22.2 13.6 22.5 14.5 L24 19 V22 C24 22.5 23.5 23 23 23 H22 C21.5 23 21 22.5 21 22 V21 H11 V22 C11 22.5 10.5 23 10 23 H9 C8.5 23 8 22.5 8 22 Z"/>
    <!-- Wheels -->
    <circle cx="11" cy="21.5" r="1.8" fill="#020617"/>
    <circle cx="21" cy="21.5" r="1.8" fill="#020617"/>
    <!-- Headlights -->
    <circle cx="22.5" cy="16" r="0.8" fill="#fef3c7"/>
    <circle cx="9.5" cy="16" r="0.8" fill="#fef3c7"/>
  </g>
  <!-- "C" letter overlay -->
  <text x="16" y="11" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#10b981" text-anchor="middle">C</text>
</svg>
